<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>99kingdoms</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600;1,700&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        height: 100%;
        background: #0a0b14;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Inter Tight', system-ui, sans-serif;
        color: #eadfc4;
        user-select: none;
      }
      .wrap { display: flex; flex-direction: column; gap: 8px; align-items: center; }
      #game {
        display: block;
        background: #7bc96f;
        border: 1px solid #2a2a2a;
        cursor: crosshair;
      }
      .hud { font-size: 12px; opacity: 0.55; letter-spacing: 0.5px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <canvas id="game" width="960" height="640"></canvas>
      <div class="hud">WASD move &middot; Space chop / pay / unlock &middot; Click or Shift to attack &middot; Survive 10 nights</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
